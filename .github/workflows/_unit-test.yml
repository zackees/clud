name: Unit Test Template

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string

jobs:
  unit-test:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 45
    env:
      RUST_BACKTRACE: "1"
      # Issue #13 follow-up: whisper-rs-sys vendors `std::filesystem::path`
      # which requires macOS 10.15+. Rust on stable defaults to 10.12,
      # which fails on the macos-15-intel runner. Force-bump so the
      # vendored C++ build sees the modern SDK target on every macOS
      # job (no-op on Linux/Windows).
      MACOSX_DEPLOYMENT_TARGET: "10.15"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ inputs.runs-on }}-py3.11-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ inputs.runs-on }}-py3.11-

      # Issue #13: cpal links against ALSA on Linux. The runner image ships
      # the runtime lib (libasound2) but not the dev headers / static archive
      # that whisper-rs-sys's CMake build also needs. Install before Rust
      # setup so any cached toolchain is unaffected.
      - name: Install Linux audio deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      # Issue #68: replace the dtolnay + sccache + rust-cache stack with soldr.
      # `build-cache-mode: thin` avoids the setup-soldr#53 pitfall where
      # ci/test.py's back-to-back cargo build / cargo test --no-run / cargo
      # test invocations share a single target dir.
      # Pinned SHA: floating `v0` regressed to a Node20 rewrite that fails
      # to honor `components` from `rust-toolchain.toml`. See
      # zackees/setup-soldr#76.
      - name: Setup soldr
        uses: zackees/setup-soldr@8bc6da394b8ad370654826a0b3d8f5e3615d10d6 # v0 (pre-Node20-rewrite)
        with:
          toolchain: "1.94.1"
          version: "0.7.11"
          cache: true
          build-cache-mode: thin

      - name: Sync
        run: uv sync --frozen --group dev --no-install-project --python 3.11 -v

      - name: Dev build
        run: uv run --no-editable -m ci.build_wheel --dev

      - name: Unit Tests
        run: uv run --no-editable -m ci.test

      - name: Upload failure logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-unit-test-${{ inputs.runs-on }}
          path: logs/*
          if-no-files-found: warn
