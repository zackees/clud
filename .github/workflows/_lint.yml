name: Lint Template

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string

jobs:
  lint:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 45
    env:
      RUST_BACKTRACE: "1"
      # Issue #13 follow-up: whisper-rs-sys vendors `std::filesystem::path`
      # which requires macOS 10.15+. Rust on stable defaults to 10.12,
      # which fails on the macos-15-intel runner. Force-bump so cargo
      # clippy compiles the same C++ source successfully (no-op on
      # Linux/Windows).
      MACOSX_DEPLOYMENT_TARGET: "10.15"
      CFLAGS: "-g0"
      CXXFLAGS: "-g0"
      SOLDR_LINKER: "fast"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ inputs.runs-on }}-py3.11-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ inputs.runs-on }}-py3.11-

      # Issue #68: replace the dtolnay + sccache + rust-cache stack with soldr.
      # Pinned to a specific SHA because the floating `v0` tag moved to a
      # Node20 TypeScript port that fails to read `components` from
      # `rust-toolchain.toml`, leaving the toolchain without rustfmt/clippy
      # and causing `cargo fmt --check` to fail with "'cargo-fmt' is not
      # installed for the toolchain". See zackees/setup-soldr#76.
      - name: Setup soldr
        uses: zackees/setup-soldr@8bc6da394b8ad370654826a0b3d8f5e3615d10d6 # v0 (pre-Node20-rewrite)
        with:
          toolchain: "1.94.1"
          version: "0.7.11"
          cache: true
          build-cache-mode: thin

      - name: Install mold linker (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends mold
          echo "RUSTFLAGS=-C link-arg=-fuse-ld=mold ${RUSTFLAGS:-}" >> "$GITHUB_ENV"

      - name: Sync
        run: uv sync --frozen --group dev --no-install-project --python 3.11 -v

      - name: Lint
        shell: bash
        run: |
          set -euo pipefail
          if [ "${RUNNER_OS}" = "Linux" ]; then
            ulimit -v 13000000
          fi
          uv run --no-editable -m ci.lint

      - name: Diagnose Linux build failure
        if: ${{ failure() && runner.os == 'Linux' }}
        shell: bash
        run: |
          set +e
          echo "::group::OOM / killed-process scan"
          (sudo dmesg 2>/dev/null || dmesg 2>/dev/null) | grep -iE 'killed|oom|out of memory|signal 9' | tail -50
          [ $? -ne 0 ] && echo "(no OOM/kill messages found)"
          echo "::endgroup::"
          echo "::group::Last 100 dmesg lines"
          (sudo dmesg 2>/dev/null || dmesg 2>/dev/null) | tail -100
          echo "::endgroup::"
          echo "::group::Memory snapshot"
          free -h
          echo "::endgroup::"
          echo "::group::Disk snapshot"
          df -h
          echo "::endgroup::"

      - name: Upload failure logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-lint-${{ inputs.runs-on }}
          path: logs/*
          if-no-files-found: warn
