name: Lint Template

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string

jobs:
  lint:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 45
    env:
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ inputs.runs-on }}-py3.11-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ inputs.runs-on }}-py3.11-

      # Issue #68: replace the dtolnay + sccache + rust-cache stack with soldr.
      - name: Setup soldr
        uses: zackees/setup-soldr@v0
        with:
          toolchain: "1.94.1"
          version: "0.7.11"
          cache: true
          build-cache-mode: thin

      - name: Sync
        run: uv sync --frozen --group dev --no-install-project --python 3.11 -v

      - name: Lint
        run: uv run --no-editable -m ci.lint

      - name: Upload failure logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-lint-${{ inputs.runs-on }}
          path: logs/*
          if-no-files-found: warn
