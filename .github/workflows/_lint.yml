name: Lint Template

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string

jobs:
  lint:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 45
    env:
      RUST_BACKTRACE: "1"
      # Issue #13 follow-up: whisper-rs-sys vendors `std::filesystem::path`
      # which requires macOS 10.15+. Rust on stable defaults to 10.12,
      # which fails on the macos-15-intel runner. Force-bump so cargo
      # clippy compiles the same C++ source successfully (no-op on
      # Linux/Windows).
      MACOSX_DEPLOYMENT_TARGET: "10.15"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ inputs.runs-on }}-py3.11-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ inputs.runs-on }}-py3.11-

      # Issue #13: cargo clippy compiles the same code path as the build
      # job, so it also needs ALSA dev headers on Linux for cpal to link.
      - name: Install Linux audio deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      # Issue #68: replace the dtolnay + sccache + rust-cache stack with soldr.
      - name: Setup soldr
        uses: zackees/setup-soldr@v0
        with:
          toolchain: "1.94.1"
          version: "0.7.11"
          cache: true
          build-cache-mode: thin

      - name: Sync
        run: uv sync --frozen --group dev --no-install-project --python 3.11 -v

      - name: Lint
        run: uv run --no-editable -m ci.lint

      - name: Upload failure logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-lint-${{ inputs.runs-on }}
          path: logs/*
          if-no-files-found: warn
