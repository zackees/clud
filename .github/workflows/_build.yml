name: Build Template

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string
      artifact-name:
        required: false
        type: string
        default: ""
      build-mode:
        required: false
        type: string
        default: "dev"
      include-sdist:
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 45
    env:
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ inputs.runs-on }}-py3.11-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ inputs.runs-on }}-py3.11-

      # Issue #68: replace dtolnay/rust-toolchain + mozilla-actions/sccache-action
      # + Swatinem/rust-cache with setup-soldr. soldr pins the MSVC toolchain on
      # Windows (issue #27) and owns build + target caching for every platform.
      - name: Setup soldr
        uses: zackees/setup-soldr@v0
        with:
          toolchain: "1.94.1"
          version: "0.7.11"
          cache: true
          build-cache-mode: thin

      - name: Sync
        run: uv sync --frozen --group dev --no-install-project --python 3.11 -v

      - name: Build wheel (${{ inputs.build-mode || 'dev' }})
        run: uv run --no-editable -m ci.build_wheel --${{ inputs.build-mode || 'dev' }}

      - name: Build sdist
        if: ${{ inputs.include-sdist }}
        run: uv run soldr maturin sdist --out dist

      - name: Verify Windows wheel has no MinGW runtime imports
        if: ${{ runner.os == 'Windows' }}
        run: uv run python -m ci.check_windows_wheel --dist-dir dist/

      - name: Upload dist artifacts
        if: ${{ inputs.artifact-name != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: dist/*
          if-no-files-found: error

      - name: Upload failure logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-build-${{ inputs.artifact-name || inputs.runs-on }}
          path: logs/*
          if-no-files-found: warn
