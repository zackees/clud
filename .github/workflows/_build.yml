name: Build Template

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string
      artifact-name:
        required: false
        type: string
        default: ""
      build-mode:
        required: false
        type: string
        default: "dev"
      include-sdist:
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 45
    env:
      RUST_BACKTRACE: "1"
      # Issue #13 follow-up: whisper-rs-sys vendors `std::filesystem::path`
      # which requires macOS 10.15+. Rust on stable defaults to 10.12,
      # which fails on the macos-15-intel runner. Force-bump so the
      # vendored C++ build sees the modern SDK target on every macOS
      # job (no-op on Linux/Windows).
      MACOSX_DEPLOYMENT_TARGET: "10.15"
      # Strip DWARF from C/C++ deps (whisper.cpp, bundled sqlite, bindgen
      # targets) to lower per-process RSS during compile. Rust debuginfo is
      # killed in Cargo.toml [profile.dev]/[profile.release].
      CFLAGS: "-g0"
      CXXFLAGS: "-g0"
      # Future-proof: when cargo is routed through soldr (issue #285) this
      # picks mold on Linux / lld elsewhere. No-op for the current direct-
      # cargo path; mold is also forced via RUSTFLAGS below on Linux.
      SOLDR_LINKER: "fast"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ inputs.runs-on }}-py3.11-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ inputs.runs-on }}-py3.11-

      # Issue #68: replace dtolnay/rust-toolchain + mozilla-actions/sccache-action
      # + Swatinem/rust-cache with setup-soldr. soldr pins the MSVC toolchain on
      # Windows (issue #27) and owns build + target caching for every platform.
      # Pinned SHA: floating `v0` regressed to a Node20 rewrite that fails
      # to honor `components` from `rust-toolchain.toml`. See
      # zackees/setup-soldr#76.
      - name: Setup soldr
        uses: zackees/setup-soldr@8bc6da394b8ad370654826a0b3d8f5e3615d10d6 # v0 (pre-Node20-rewrite)
        with:
          toolchain: "1.94.1"
          version: "0.7.11"
          cache: true
          build-cache-mode: thin

      - name: Install mold linker (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends mold
          # Force mold even when cargo isn't routed through soldr. Halves
          # peak linker RSS vs. BFD/gold on clud's release link.
          echo "RUSTFLAGS=-C link-arg=-fuse-ld=mold ${RUSTFLAGS:-}" >> "$GITHUB_ENV"

      - name: Sync
        run: uv sync --frozen --group dev --no-install-project --python 3.11 -v

      - name: Build wheel (${{ inputs.build-mode || 'dev' }})
        shell: bash
        run: |
          set -euo pipefail
          # Defensive RLIMIT_AS cap (~13 GB of 14-16 GB runner). When the
          # build genuinely runs out of memory, exceeding this kills the
          # offending process with a clean mmap/alloc failure instead of
          # an unexplained `137` from the kernel OOM killer.
          if [ "${RUNNER_OS}" = "Linux" ]; then
            ulimit -v 13000000
          fi
          uv run --no-editable -m ci.build_wheel --${{ inputs.build-mode || 'dev' }}

      - name: Build sdist
        if: ${{ inputs.include-sdist }}
        run: uv run python -m maturin sdist --out dist

      - name: Verify Windows wheel has no MinGW runtime imports
        if: ${{ runner.os == 'Windows' }}
        run: uv run python -m ci.check_windows_wheel --dist-dir dist/

      - name: Upload dist artifacts
        if: ${{ inputs.artifact-name != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: dist/*
          if-no-files-found: error

      - name: Diagnose Linux build failure
        if: ${{ failure() && runner.os == 'Linux' }}
        shell: bash
        run: |
          set +e
          echo "::group::OOM / killed-process scan"
          (sudo dmesg 2>/dev/null || dmesg 2>/dev/null) | grep -iE 'killed|oom|out of memory|signal 9' | tail -50
          [ $? -ne 0 ] && echo "(no OOM/kill messages found)"
          echo "::endgroup::"
          echo "::group::Last 100 dmesg lines"
          (sudo dmesg 2>/dev/null || dmesg 2>/dev/null) | tail -100
          echo "::endgroup::"
          echo "::group::Memory snapshot"
          free -h
          echo "::endgroup::"
          echo "::group::Disk snapshot"
          df -h
          echo "::endgroup::"

      - name: Upload failure logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-build-${{ inputs.artifact-name || inputs.runs-on }}
          path: logs/*
          if-no-files-found: warn
