name: Integration Test Template

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string
      artifact-name:
        required: false
        type: string
        default: ""

jobs:
  integration-test:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 45
    env:
      RUST_BACKTRACE: "1"
      CLUD_INTEGRATION_TESTS: "1"
      # Issue #13 follow-up: whisper-rs-sys vendors `std::filesystem::path`
      # which requires macOS 10.15+. Rust on stable defaults to 10.12,
      # which fails on the macos-15-intel runner. Force-bump so the
      # vendored C++ build sees the modern SDK target on every macOS
      # job (no-op on Linux/Windows).
      MACOSX_DEPLOYMENT_TARGET: "10.15"
      CFLAGS: "-g0"
      CXXFLAGS: "-g0"
      CLUD_USE_SOLDR_SHIMS: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ inputs.runs-on }}-py3.11-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ inputs.runs-on }}-py3.11-

      - name: Install mold linker (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t microsoft_sources < <(grep -rl 'packages.microsoft.com' /etc/apt/sources.list.d 2>/dev/null || true)
          if [ "${#microsoft_sources[@]}" -gt 0 ]; then
            sudo rm -f "${microsoft_sources[@]}"
          fi
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends mold

      # Issue #68: setup-soldr owns Rust provisioning plus build/target caching.
      # Shims keep the dev wheel build and integration helper cargo build
      # routed through soldr/zccache. Install mold before setup so dependency
      # cooking and the dev wheel build share the same linker fingerprint.
      - name: Setup soldr
        uses: zackees/setup-soldr@v0.9.66
        with:
          toolchain: "1.94.1"
          # soldr 0.8.0 does not ship x86_64-apple-darwin; keep the
          # last known macOS Intel binary there while every other runner
          # uses the latest release.
          version: ${{ contains(inputs.runs-on, 'intel') && '0.7.45' || '0.8.0' }}
          cache: true
          build-cache-mode: thin
          shims: true
          linker: ${{ runner.os == 'macOS' && 'platform-default' || 'fast' }}
          preserve-source-mtimes: true
          solo-toolchain-cache: true
          prebuild-deps: ${{ runner.os == 'Windows' && 'none' || 'soldr-cook' }}
          prebuild-deps-flags: "--workspace"

      - name: Restore source checkout
        shell: bash
        run: |
          set -euo pipefail
          if ! git diff --quiet || ! git diff --cached --quiet; then
            echo "::group::Files changed by dependency prebuild"
            git diff --name-only
            git diff --cached --name-only
            echo "::endgroup::"
            git restore --staged --worktree -- .
          fi

      - name: Sync
        run: uv sync --frozen --group dev --no-install-project --python 3.11 -v

      - name: Dev build
        shell: bash
        run: |
          set -euo pipefail
          if [ "${RUNNER_OS}" = "Linux" ]; then
            ulimit -v 13000000
          fi
          uv run --no-editable -m ci.build_wheel --dev

      - name: Integration Tests
        shell: bash
        run: |
          set -euo pipefail
          if [ "${RUNNER_OS}" = "Linux" ]; then
            ulimit -v 13000000
          fi
          uv run --no-editable -m ci.test --integration

      - name: Verify Windows wheel has no MinGW runtime imports
        if: ${{ runner.os == 'Windows' }}
        run: uv run python -m ci.check_windows_wheel --dist-dir dist/

      - name: Upload dist artifacts
        if: ${{ inputs.artifact-name != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: dist/*
          if-no-files-found: error

      - name: Diagnose Linux build failure
        if: ${{ failure() && runner.os == 'Linux' }}
        shell: bash
        run: |
          set +e
          echo "::group::OOM / killed-process scan"
          (sudo dmesg 2>/dev/null || dmesg 2>/dev/null) | grep -iE 'killed|oom|out of memory|signal 9' | tail -50
          [ $? -ne 0 ] && echo "(no OOM/kill messages found)"
          echo "::endgroup::"
          echo "::group::Last 100 dmesg lines"
          (sudo dmesg 2>/dev/null || dmesg 2>/dev/null) | tail -100
          echo "::endgroup::"
          echo "::group::Memory snapshot"
          free -h
          echo "::endgroup::"
          echo "::group::Disk snapshot"
          df -h
          echo "::endgroup::"

      - name: Upload failure logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-integration-test-${{ inputs.runs-on }}
          path: logs/*
          if-no-files-found: warn
