name: Integration Test Template

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string

jobs:
  integration-test:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 45
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      RUST_BACKTRACE: "1"
      CLUD_INTEGRATION_TESTS: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ inputs.runs-on }}-py3.11-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ inputs.runs-on }}-py3.11-

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          components: clippy, rustfmt

      - name: Sync
        run: uv sync --frozen --group dev --no-install-project --python 3.11 -v

      - name: Verify soldr is installed (Windows, issue #27)
        if: ${{ runner.os == 'Windows' }}
        run: uv run soldr --version

      - uses: Swatinem/rust-cache@v2

      - name: Dev build
        run: uv run --no-editable -m ci.build_wheel --dev

      - name: Integration Tests
        run: uv run --no-editable -m ci.test --integration

      - name: Upload failure logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-integration-test-${{ inputs.runs-on }}
          path: logs/*
          if-no-files-found: warn
