[package]
name = "clud"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Fast CLI for running Claude Code and Codex in YOLO mode"

[dependencies]
base64 = "0.22"
clap = { version = "4", features = ["derive"] }
crossterm = "0.29"
ctrlc = "3"
# Issue #73: SQLite-backed session registry. `bundled` so we don't depend on
# a system libsqlite3 (especially relevant on Windows / fresh CI runners).
rusqlite = { version = "0.32", features = ["bundled"] }
running-process-core = "3.1.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sysinfo = "0.37"
terminal_size = "0.4"
vt100 = "0.16"
vte = "0.15"
wasmi = "0.40.0"
which = "7"

[dev-dependencies]
tempfile = "3"

[lib]
name = "clud"
path = "src/lib.rs"

[[test]]
name = "pty_behavior"
path = "tests/pty_behavior.rs"

[target.'cfg(unix)'.dependencies]
libc = "0.2"
signal-hook = "0.3"

[target.'cfg(target_os = "windows")'.dependencies]
# Issue #79 (Part A) — Windows IDropTarget COM registration on the console
# window so dragged files reach `clud` even when conhost would refuse the
# drop. Pinned to the same major as transitively present in the lockfile
# (windows-0.61.3) to avoid introducing a second copy of the crate graph.
windows = { version = "0.61", features = [
    "Win32_Foundation",
    "Win32_Graphics_Gdi",
    "Win32_System_Com",
    "Win32_System_Com_StructuredStorage",
    "Win32_System_Console",
    "Win32_System_DataExchange",
    "Win32_System_Memory",
    "Win32_System_Ole",
    "Win32_System_SystemServices",
    "Win32_UI_Shell",
] }
# Required so the `windows_core::Result` / `windows_core::Ref` types
# referenced in our `IDropTarget_Impl` signatures (and the
# `#[implement]` proc-macro re-exported as `windows::core::implement`)
# resolve through a stable path. The umbrella `windows` crate also
# re-exports them as `windows::core::*` but having the direct dep is
# the documented pattern for `#[implement]` users.
windows-core = "0.61"

[target.'cfg(all(target_os = "windows", target_arch = "x86_64"))'.dependencies]
cpal = "0.16"
rodio = "0.21"
whisper-rs = "0.16"

[target.'cfg(all(target_os = "macos", target_arch = "aarch64"))'.dependencies]
cpal = "0.16"
rodio = "0.21"
whisper-rs = "0.16"

[[bin]]
name = "clud"
path = "src/main.rs"
