[workspace]
resolver = "2"
members = [
    "crates/clud-bin",
    "testbins/mock-agent",
]

[workspace.package]
version = "2.0.3"
edition = "2021"
rust-version = "1.85"
license = "BSD-3-Clause"
repository = "https://github.com/zackees/clud"
homepage = "https://github.com/zackees/clud"

[profile.release]
debug = "line-tables-only"
split-debuginfo = "packed"
strip = "none"

[patch.crates-io]
whisper-rs = { path = "vendor/whisper-rs" }
whisper-rs-sys = { path = "vendor/whisper-rs-sys" }
